<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="50%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#94a3b8" opacity="0.12"/>
    </pattern>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Dot grid -->
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Blurred orbs -->
  <ellipse cx="200" cy="150" rx="300" ry="250" fill="url(#orb1)" filter="url(#blur1)"/>
  <ellipse cx="1200" cy="100" rx="250" ry="200" fill="url(#orb2)" filter="url(#blur1)"/>
  <ellipse cx="700" cy="800" rx="350" ry="200" fill="url(#orb3)" filter="url(#blur1)"/>
  <ellipse cx="1100" cy="600" rx="200" ry="200" fill="url(#orb1)" filter="url(#blur2)"/>

  <!-- Abstract wave shapes -->
  <path d="M0,200 Q360,120 720,200 T1440,180 L1440,900 L0,900 Z" fill="url(#wave1)"/>
  <path d="M0,500 Q480,420 960,500 T1440,480 L1440,900 L0,900 Z" fill="url(#wave2)"/>

  <!-- Geometric accent lines -->
  <line x1="100" y1="300" x2="400" y2="280" stroke="#10b981" stroke-width="0.5" opacity="0.1"/>
  <line x1="900" y1="150" x2="1300" y2="200" stroke="#3b82f6" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="700" x2="600" y2="680" stroke="#10b981" stroke-width="0.5" opacity="0.06"/>

  <!-- Small geometric shapes -->
  <polygon points="1350,80 1370,120 1330,120" fill="#10b981" opacity="0.06"/>
  <polygon points="80,600 110,650 50,650" fill="#3b82f6" opacity="0.05"/>
  <rect x="1200" y="400" width="40" height="40" rx="8" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.08" transform="rotate(15 1220 420)"/>
  <circle cx="350" cy="100" r="20" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.1"/>

  <!-- Cross marks -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.8">
    <line x1="1380" y1="250" x2="1400" y2="270"/><line x1="1400" y1="250" x2="1380" y2="270"/>
    <line x1="50" y1="350" x2="70" y2="370"/><line x1="70" y1="350" x2="50" y2="370"/>
    <line x1="800" y1="820" x2="820" y2="840"/><line x1="820" y1="820" x2="800" y2="840"/>
  </g>
</svg>
